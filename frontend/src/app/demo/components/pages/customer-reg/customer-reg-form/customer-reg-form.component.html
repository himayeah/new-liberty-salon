<h2 mat-dialog-title>{{ isViewMode ? 'View Customer Data' : (isEditMode ? 'Edit Customer Data' : 'Add New Customer') }}</h2>

<mat-dialog-content>
    <form [formGroup]="customerForm">

        <!--Firstname, last name-->
        <div class="form-row">
            <mat-form-field appearance="fill">
                <mat-label>First Name</mat-label>
                <input matInput formControlName="firstName" placeholder="John">
            </mat-form-field>
            <mat-form-field appearance="fill">
                <mat-label>Last Name</mat-label>
                <input matInput formControlName="lastName" placeholder="Doe">
            </mat-form-field>
        </div>

        <!--Email, Phone Number-->
        <div class="form-row">
            <mat-form-field appearance="fill">
                <mat-label>Email Address</mat-label>
                <input matInput type="email" formControlName="email" placeholder="johndoe@gmail.com">
            </mat-form-field>
            <mat-form-field appearance="fill">
                <mat-label>Phone Number</mat-label>
                <input matInput type="tel" formControlName="phoneNumber" placeholder="070xxxxxx">
            </mat-form-field>
        </div>

        <!--Date of Birth, Preferred Stylist-->
        <div class="form-row">
            <mat-form-field appearance="fill">
                <mat-label>Date of Birth</mat-label>
                <input matInput [matDatepicker]="dobPicker" formControlName="dateOfBirth">
                <mat-datepicker-toggle matIconSuffix [for]="dobPicker"></mat-datepicker-toggle>
                <mat-datepicker #dobPicker></mat-datepicker>
            </mat-form-field>

             <mat-form-field appearance="fill">
                <mat-label>Preferred Stylist</mat-label>
                <mat-select formControlName="preferredStylist">
                    <mat-option *ngFor="let emp of employees" [value]="emp.employeeName">
                        {{ emp.employeeName }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="onCancel()">{{ isViewMode ? 'Close' : 'Cancel' }}</button>
  <button *ngIf="!isViewMode" mat-raised-button color="primary" (click)="onSave()" [disabled]="customerForm.invalid">
    {{ isEditMode ? 'Update' : 'Save' }}
  </button>
</mat-dialog-actions>
