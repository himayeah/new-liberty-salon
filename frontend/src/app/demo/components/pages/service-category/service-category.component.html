<div class="container">
    <mat-card class="category-card">
        <div class="header-section">
            <h2>Service Category Information</h2>
            <button mat-icon-button (click)="refreshData()" matTooltip="Refresh">
                <mat-icon class="material-icons">refresh</mat-icon>
            </button>
        </div>

        <div class="content-section">
            <div class="actions-bar">
                <button mat-raised-button color="primary" (click)="openAddCategoryModal()">
                    <mat-icon class="material-icons">add</mat-icon> Add New Category
                </button>

                <mat-form-field appearance="outline" class="search-field">
                    <mat-label>Filter</mat-label>
                    <input matInput (input)="applyFilter($event)" placeholder="Search categories" #input />
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>
            </div>

            <div class="table-container">
                <table mat-table [dataSource]="dataSource" matSort>
                    <!--Columns-->
                    <ng-container matColumnDef="displayOrder">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Order </th>
                        <td mat-cell *matCellDef="let element">{{ element.displayOrder }}</td>
                    </ng-container>

                    <ng-container matColumnDef="categoryName">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Category Name </th>
                        <td mat-cell *matCellDef="let element">{{ element.categoryName }}</td>
                    </ng-container>

                    <ng-container matColumnDef="description">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Description </th>
                        <td mat-cell *matCellDef="let element" class="description-cell">{{ element.description }}</td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                        <td mat-cell *matCellDef="let element">
                            <button mat-icon-button color="primary" (click)="editData(element)" matTooltip="Edit">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteData(element)" matTooltip="Delete">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <!--Rows-->
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="{
                  'selected-row': selectedRow?.id === row.id,
                  'added-row': lastAddedRow?.id === row.id,
                  'edited-row': lastEditedRow?.id === row.id
              }">
                    </tr>

                    <tr class="mat-row" *matNoDataRow>
                        <td class="mat-cell" colspan="4" style="padding: 16px; text-align: center;">No data matching the
                            filter "{{input.value}}"</td>
                    </tr>
                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
        </div>
    </mat-card>
</div>
