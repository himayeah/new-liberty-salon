<div class="report-container">
    <div class="report-header">
        <div class="title-label-container">
            <h2 class="report-title">
                <mat-icon>assessment</mat-icon>
                Product Sales Report
            </h2>
            <span class="report-subtitle">Overview of Product Sales</span>
        </div>
    </div>

        <!-- product sales details table-->
        <div class="table-section" style="grid-column: 1 / -1;">
            <mat-card class="report-card">
                <mat-card-header>
                    <mat-card-title>Product Sales Summary</mat-card-title>
                    <span class="time-label">last 30 days</span>
                </mat-card-header>
                <mat-card-content>
                    <div class="table-container">
                        <!--connect "productSalesData" from the ts file to the HTML dataSource to display data in the table-->
                        <table mat-table [dataSource]="productSalesData" class="full-width-table">

                            <ng-container matColumnDef="productName">
                                <th mat-header-cell *matHeaderCellDef> Product Name </th>
                                <td mat-cell *matCellDef="let element"> {{element.productName}} </td>
                            </ng-container>

                            <ng-container matColumnDef="soldAmount">
                                <th mat-header-cell *matHeaderCellDef> Sold Amount </th>
                                <td mat-cell *matCellDef="let element"> {{element.soldAmount}} </td>
                            </ng-container>

                            <ng-container matColumnDef="revenue">
                                <th mat-header-cell *matHeaderCellDef> Revenue </th>
                                <td mat-cell *matCellDef="let element"> {{element.revenue}} </td>
                            </ng-container>

                            <tr mat-header-row
                                *matHeaderRowDef="['productName', 'soldAmount', 'revenue']">
                            </tr>
                            <tr mat-row
                                *matRowDef="let row; columns: ['productName', 'soldAmount', 'revenue'];">
                            </tr>

                            <tr class="mat-row" *matNoDataRow>
                                <td class="mat-cell" colspan="4" style="text-align: center; padding: 20px;">
                                    No product Sales data available.
                                </td>
                            </tr>
                        </table>
                    </div>
                </mat-card-content>
            </mat-card>
        </div>
</div>
