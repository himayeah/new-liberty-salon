<h2 mat-dialog-title>Edit Employee Attendance</h2>
<mat-dialog-content>
    <form [formGroup]="attendanceForm" class="form-container">
        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Employee Name</mat-label>
                <input matInput formControlName="employeeName" readonly>
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Check-in Time</mat-label>
                <input matInput formControlName="checkInTime" placeholder="e.g. 09:00 AM">
                <mat-hint>Use AM/PM format</mat-hint>
                <mat-error *ngIf="attendanceForm.get('checkInTime')?.hasError('invalidTime')">Enter time as e.g. 09:00 AM</mat-error>
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Check-out Time</mat-label>
                <input matInput formControlName="checkOutTime" placeholder="e.g. 05:00 PM">
                <mat-hint>Use AM/PM format</mat-hint>
                <mat-error *ngIf="attendanceForm.get('checkOutTime')?.hasError('invalidTime')">Enter time as e.g. 05:00 PM</mat-error>
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Status</mat-label>
                <mat-select formControlName="status">
                    <mat-option value="Present">Present</mat-option>
                    <mat-option value="Absent">Absent</mat-option>
                    <mat-option value="Late">Late</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end" class="dialog-actions">
    <button mat-button (click)="onCancel()" color="warn">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSave()" [disabled]="attendanceForm.invalid">Update</button>
</mat-dialog-actions>
