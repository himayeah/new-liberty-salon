<h2 mat-dialog-title>{{ isEditMode ? 'Edit Client Profile' : 'Add New Client' }}</h2>

<mat-dialog-content>
  <form [formGroup]="clientForm" class="form-container">
    
    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName" placeholder="John">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName" placeholder="Doe">
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline" class="flex-60">
        <mat-label>Email Address</mat-label>
        <input matInput type="email" formControlName="email" placeholder="john.doe@example.com">
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="flex-40">
        <mat-label>Phone Number</mat-label>
        <input matInput type="tel" formControlName="phoneNumber" placeholder="07XXXXXXXX">
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Gender</mat-label>
        <mat-select formControlName="gender">
          <mat-option value="Male">Male</mat-option>
          <mat-option value="Female">Female</mat-option>
          <mat-option value="Other">Other</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Date of Birth</mat-label>
        <input matInput [matDatepicker]="dobPicker" formControlName="dateOfBirth">
        <mat-datepicker-toggle matSuffix [for]="dobPicker"></mat-datepicker-toggle>
        <mat-datepicker #dobPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Preferred Stylist</mat-label>
        <mat-select formControlName="preferredStylist">
          <mat-option *ngFor="let emp of employees" [value]="emp.employeeName">
            {{ emp.employeeName }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Allergies & Medical Notes</mat-label>
        <textarea matInput formControlName="allergies" rows="3" placeholder="Any known allergies or conditions..."></textarea>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="clientForm.invalid">
    {{ isEditMode ? 'Update' : 'Save' }}
  </button>
</mat-dialog-actions>
