<h2 mat-dialog-title>{{ isEditMode ? 'Edit Employee Profile' : 'Add New Employee' }}</h2>

<mat-dialog-content>
  <form [formGroup]="employeeForm" class="form-container">
    
    <div class="form-row">
      <mat-form-field appearance="outline" class="flex-60">
        <mat-label>Employee Name</mat-label>
        <input matInput formControlName="employeeName" placeholder="Full Name">
      </mat-form-field>

      <mat-form-field appearance="outline" class="flex-40">
        <mat-label>Date Joined</mat-label>
        <input matInput [matDatepicker]="joinPicker" formControlName="dateJoined">
        <mat-datepicker-toggle matSuffix [for]="joinPicker"></mat-datepicker-toggle>
        <mat-datepicker #joinPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline" class="flex-50">
        <mat-label>Designation</mat-label>
        <mat-select formControlName="designation">
          <mat-option value="Stylist">Stylist</mat-option>
          <mat-option value="Senior Stylist">Senior Stylist</mat-option>
          <mat-option value="Colorist">Colorist</mat-option>
          <mat-option value="Manager">Manager</mat-option>
          <mat-option value="Receptionist">Receptionist</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="flex-50">
        <mat-label>Specializations</mat-label>
        <input matInput formControlName="specializations" placeholder="e.g. Haircut, Coloring">
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Hourly Rate</mat-label>
        <input matInput formControlName="hourlyRate" placeholder="e.g. 50">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Commission Rate</mat-label>
        <input matInput formControlName="commissionRate" placeholder="e.g. 10%">
      </mat-form-field>
    </div>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Weekly Off Days</mat-label>
        <mat-select formControlName="weeklyOffDays" multiple>
          <mat-option value="Monday">Monday</mat-option>
          <mat-option value="Tuesday">Tuesday</mat-option>
          <mat-option value="Wednesday">Wednesday</mat-option>
          <mat-option value="Thursday">Thursday</mat-option>
          <mat-option value="Friday">Friday</mat-option>
          <mat-option value="Saturday">Saturday</mat-option>
          <mat-option value="Sunday">Sunday</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Max Appointments per Day</mat-label>
        <input matInput type="number" formControlName="maxAppointmentsPerDay" placeholder="e.g. 8">
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="employeeForm.invalid">
    {{ isEditMode ? 'Update' : 'Save' }}
  </button>
</mat-dialog-actions>
