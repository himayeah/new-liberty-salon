<div class="container">
    <mat-card class="tax-card">
        <div class="header-section">
            <h2>Tax Information</h2>
            <button mat-icon-button (click)="refreshData()" matTooltip="Refresh">
                <mat-icon class="material-icons">refresh</mat-icon>
            </button>
        </div>

        <div class="content-section">
            <div class="actions-bar">
                <button mat-raised-button color="primary" (click)="openAddTaxModal()">
                    <mat-icon class="material-icons">add</mat-icon> Add New Tax
                </button>

                <mat-form-field appearance="outline" class="search-field">
                    <mat-label>Filter</mat-label>
                    <input matInput (keyup)="applyFilter($event)" placeholder="Search Tax" #input />
                    <mat-icon matSuffix class="material-icons">search</mat-icon>
                </mat-form-field>
            </div>
            <div class="table-container">
                <table mat-table [dataSource]="dataSource" matSort>
                    <!--Columns-->
                    <ng-container matColumnDef="taxName">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Tax Name </th>
                        <td mat-cell *matCellDef="let element">{{ element.taxName }}</td>
                    </ng-container>

                    <ng-container matColumnDef="taxRate">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Tax Rate </th>
                        <td mat-cell *matCellDef="let element">{{ element.taxRate }}</td>
                    </ng-container>

                    <ng-container matColumnDef="effectiveDate">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Effective Date </th>
                        <td mat-cell *matCellDef="let element">{{ element.effectiveDate | date:'mediumDate' }}</td>
                    </ng-container>

                    <ng-container matColumnDef="isActive">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Is Active </th>
                        <td mat-cell *matCellDef="let element">{{ element.isActive }}</td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                        <td mat-cell *matCellDef="let element">
                            <button mat-button color="accent" (click)="viewData(element)" matTooltip="View Profile">
                                <mat-icon class="material-icons">visibility</mat-icon> View
                            </button>
                            <button mat-button color="primary" (click)="editData(element)" matTooltip="Edit">
                                <mat-icon class="material-icons">edit</mat-icon> Edit
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteData(element)" matTooltip="Delete">
                                <mat-icon class="material-icons">delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <!-- Rows -->
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="{
                  'selected-row': selectedRow?.id === row.id,
                  'added-row': lastAddedRow?.id === row.id,
                  'edited-row': lastEditedRow?.id === row.id
                }">
                    </tr>

                    <!--Row shown when there is no matching data-->
                    <tr class="mat-row" *matNoDataRow>
                        <td class="mat-cell" colspan="12" style="padding: 16px; text-align: center;">No data matching
                            the
                            filter
                            "{{input.value}}"</td>
                    </tr>

                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons
                aria-labels="Select page of Taxes"></mat-paginator>
        </div>
    </mat-card>
</div>
