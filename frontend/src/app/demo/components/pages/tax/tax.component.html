<div class="container my-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Tax Registration</h4>
        </div>
        <div class="card-body">
            <form [formGroup]="taxForm" (ngSubmit)="onSubmit()">
                <div class="row g-3">
                    <!--tax name-->
                    <div class="col-md-6">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Tax Name</mat-label>
                            <input matInput formControlName="taxName" />
                            <mat-error *ngIf="isInvalid('taxName','required')">
                                Tax Name is required
                            </mat-error>
                        </mat-form-field>
                    </div>
                    <!--tax rate-->
                    <div class="col-md-6">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label> Tax Rate </mat-label>
                            <input matInput formControlName="taxRate" />
                            <mat-error *ngIf="isInvalid('taxRate','required')">
                                Tax Rate is required
                            </mat-error>
                        </mat-form-field>
                    </div>
                    <!--effective date-->
                    <div class="col-md-6">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Effective Date</mat-label>
                            <input matInput [matDatepicker]="picker" formControlName="effectiveDate"
                                placeholder="Choose effective date" />
                            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                            <mat-datepicker #picker></mat-datepicker>
                            <mat-error *ngIf="isInvalid('effectiveDate','required')">
                                Effective Date is required
                            </mat-error>
                        </mat-form-field>
                    </div>
                    <!--is Active-->
                    <div class="col-md-6">
                        <mat-checkbox formControlName="isActive"></mat-checkbox>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!--Table section-->
    <div class="card shadow-sm mt-5">
        <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Tax List</h4>
            <button mat-raised-button color="primary" (click)="refreshData()" matTooltip="Refresh">Refresh</button>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-4">
                    <mat-form-field appearance="outline" class="w-100">
                        <mat-label>Filter</mat-label>
                        <input matInput (keyup)="applyFilter($event)" placeholder="Search by tax name" />
                    </mat-form-field>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource" matSort class="table table-bordered table-hover">
                <!--Tax Name Column-->
                <ng-container matColumnDef="taxName">
                    <mat-header-cell *matHeaderCellDef mat-sort-header>Tax Name</mat-header-cell>
                    <mat-cell *matCellDef="let element">{{ element.taxName }}</mat-cell>
                </ng-container>

                <!--Tax Rate Column-->
                <ng-container matColumnDef="taxRate">
                    <mat-header-cell *matHeaderCellDef mat-sort-header>Tax Rate</mat-header-cell>
                    <mat-cell *matCellDef="let element">{{ element.taxRate }}</mat-cell>
                </ng-container>

                <!--Effective Date Column-->
                <ng-container matColumnDef="effectiveDate">
                    <mat-header-cell *matHeaderCellDef mat-sort-header>Effective Date</mat-header-cell>
                    <mat-cell *matCellDef="let element">{{ element.effectiveDate }}</mat-cell>
                </ng-container>

                <!--Is Active Column-->
                <ng-container matColumnDef="isActive">
                    <mat-header-cell *matHeaderCellDef mat-sort-header>Is Active</mat-header-cell>
                    <mat-cell *matCellDef="let element">{{ element.isActive }}</mat-cell>
                </ng-container>

                <!--Action Column-->
                <ng-container matColumnDef="action">
                    <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
                    <mat-cell *matCellDef="let element">
                        <button mat-icon-button matTooltip="Edit" (click)="editData(element)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button matTooltip="Delete" (click)="deleteData(element)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </mat-cell>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>
        </div>
    </div>

</div>
