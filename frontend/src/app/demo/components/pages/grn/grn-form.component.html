<h2 mat-dialog-title>{{ data.mode === 'add' ? 'Add GRN Record' : 'Edit GRN Record' }}</h2>
<mat-dialog-content>
    <form [formGroup]="grnForm">
        <div class="row pt-2">
            <!-- Product -->
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Product</mat-label>
                    <mat-select formControlName="productId" placeholder="Select Product from PO">
                        <mat-option *ngFor="let product of products" [value]="product.id">
                            {{ product.productName }}
                        </mat-option>
                    </mat-select>
                    <mat-error *ngIf="submitted && grnForm.get('productId')!.hasError('required')">Product is
                        required</mat-error>
                </mat-form-field>
            </div>

            <!-- Ordered Quantity -->
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Ordered Quantity</mat-label>
                    <input matInput type="number" formControlName="orderedQuantity" readonly>
                    <mat-hint>Auto-filled from PO</mat-hint>
                    <mat-error
                        *ngIf="submitted && grnForm.get('orderedQuantity')!.hasError('required')">Required</mat-error>
                </mat-form-field>
            </div>

            <!-- Received Quantity -->
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Received Quantity</mat-label>
                    <input matInput type="number" formControlName="receivedQuantity" autofocus>
                    <mat-error
                        *ngIf="submitted && grnForm.get('receivedQuantity')!.hasError('required')">Required</mat-error>
                </mat-form-field>
            </div>

            <!-- Ordered Date -->
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Ordered Date</mat-label>
                    <input matInput [matDatepicker]="orderedPicker" formControlName="orderedDate" readonly>
                    <mat-datepicker-toggle matSuffix [for]="orderedPicker" disabled></mat-datepicker-toggle>
                    <mat-datepicker #orderedPicker></mat-datepicker>
                    <mat-hint>Auto-filled from PO</mat-hint>
                    <mat-error
                        *ngIf="submitted && grnForm.get('orderedDate')!.hasError('required')">Required</mat-error>
                </mat-form-field>
            </div>

            <!-- Received Date -->
            <div class="col-12 col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Received Date</mat-label>
                    <input matInput [matDatepicker]="receivedPicker" formControlName="receivedDate">
                    <mat-datepicker-toggle matSuffix [for]="receivedPicker"></mat-datepicker-toggle>
                    <mat-datepicker #receivedPicker></mat-datepicker>
                    <mat-error
                        *ngIf="submitted && grnForm.get('receivedDate')!.hasError('required')">Required</mat-error>
                </mat-form-field>
            </div>

            <!-- Remarks -->
            <div class="col-12">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Remarks</mat-label>
                    <textarea matInput formControlName="remarks" rows="2"></textarea>
                </mat-form-field>
            </div>
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="isButtonDisabled">
        {{ data.mode === 'add' ? 'Save GRN' : 'Update GRN' }}
    </button>
</mat-dialog-actions>
