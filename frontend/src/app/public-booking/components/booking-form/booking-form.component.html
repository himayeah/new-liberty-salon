<div *ngIf="!bookingConfirmed; else confirmation" class="flex justify-content-center align-items-center min-h-screen">
    <div class="surface-card p-4 shadow-2 border-round w-full lg:w-6">
        <div class="text-center mb-5">
            <h2 class="text-900 font-medium mb-3">Book Your Appointment</h2>
            <span class="text-600 font-medium line-height-3">Welcome, {{ client?.firstName }}! Please select your preferences.</span>
        </div>

        <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()">
            <div class="grid">
                <div class="col-12 md:col-6 mb-3">
                    <label for="stylist" class="block text-900 font-medium mb-2">Preferred Stylist</label>
                    <p-dropdown id="stylist" [options]="stylists" formControlName="employeeId" optionLabel="firstName" optionValue="id" placeholder="Select Stylist" class="w-full"></p-dropdown>
                </div>

                <div class="col-12 md:col-6 mb-3">
                    <label for="service" class="block text-900 font-medium mb-2">Service</label>
                    <p-dropdown id="service" [options]="services" formControlName="serviceId" optionLabel="serviceName" optionValue="id" placeholder="Select Service" class="w-full"></p-dropdown>
                </div>

                <div class="col-12 md:col-6 mb-3">
                    <label for="date" class="block text-900 font-medium mb-2">Date</label>
                    <p-calendar id="date" formControlName="appointmentDate" dateFormat="yy-mm-dd" class="w-full"></p-calendar>
                </div>

                <div class="col-12 md:col-6 mb-3">
                    <label for="time" class="block text-900 font-medium mb-2">Time</label>
                    <input id="time" type="time" pInputText formControlName="appointmentStartTime" class="w-full">
                </div>
            </div>

            <button pButton pRipple label="Book My Appointment" class="w-full mt-4"></button>
        </form>
    </div>
</div>

<ng-template #confirmation>
    <div class="flex justify-content-center align-items-center min-h-screen">
        <div class="surface-card p-6 shadow-2 border-round w-full lg:w-4 text-center">
            <i class="pi pi-check-circle text-green-500 text-6xl mb-4"></i>
            <h2 class="text-900 font-medium mb-2">Booking Confirmed!</h2>
            <p class="text-600 mb-5">Thank you, {{ client?.firstName }}. Your appointment has been scheduled and a notification has been sent to our salon.</p>
            <button pButton pRipple label="Back to Login" class="p-button-outlined w-full" (click)="bookingConfirmed = false; client = null"></button>
        </div>
    </div>
</ng-template>
