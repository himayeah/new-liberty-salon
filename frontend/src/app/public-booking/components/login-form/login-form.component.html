<div class="booking-wrapper">
    <mat-card class="booking-card">
        <div class="header-banner">
            <h2>{{ isRegistering ? 'Register' : 'Client Login' }}</h2>
            <p>Enter your details to {{ isRegistering ? 'register' : 'continue to booking' }}</p>
        </div>

        <mat-card-content>
            <form [formGroup]="loginForm" class="form-container" (ngSubmit)="isRegistering ? onRegister() : onSubmit()">
                <div class="form-row">
                    <mat-form-field appearance="outline">
                        <mat-label>First Name</mat-label>
                        <input matInput formControlName="firstName">
                    </mat-form-field>
                </div>

                <div class="form-row">
                    <mat-form-field appearance="outline">
                        <mat-label>Email</mat-label>
                        <input matInput type="email" formControlName="email">
                    </mat-form-field>
                </div>

                <div class="action-buttons">
                    <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">
                        {{ isRegistering ? 'Register & Book' : 'Login' }}
                    </button>
                </div>

                <div *ngIf="!isRegistering" class="toggle-link text-center mt-3">
                    <span class="text-600">First time here? </span>
                    <a (click)="isRegistering = true" class="text-blue-500 cursor-pointer">Register</a>
                </div>
                <div *ngIf="isRegistering" class="toggle-link text-center mt-3">
                    <span class="text-600">Already have an account? </span>
                    <a (click)="isRegistering = false" class="text-blue-500 cursor-pointer">Login</a>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
